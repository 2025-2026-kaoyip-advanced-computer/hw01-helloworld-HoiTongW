<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園物品借用申請系統</title>
    <style>
        /* 全局重置 & 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', Arial, sans-serif; /* 适配繁体中文 */
        }

        body {
            background: linear-gradient(135deg, #12acf3 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* 标题样式 */
        .main-title {
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 测试区域样式（弱化处理，突出核心表单） */
        .test-section {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .test-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.9);
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .test-btn:hover {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .test-form {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .test-form label {
            color: #fff;
            font-weight: bold;
        }

        .test-form input[type="text"] {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 4px;
            outline: none;
        }

        .test-form input[type="submit"] {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            background: #fff;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .test-form input[type="submit"]:hover {
            background: #f0f0f0;
        }

        /* 核心借用表单样式（匹配设计图） */
        #borrowForm {
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .form-header {
            font-size: 1.5rem;
            color: #333;
            text-align: center;
            margin-bottom: 1.8rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        /* 输入框/下拉框/文本域通用样式 */
        .form-input {
            width: 100%;
            padding: 0.7rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #12acf3;
            box-shadow: 0 0 0 2px rgba(18, 172, 243, 0.1);
        }

        /* 单选/复选框样式 */
        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 提交按钮样式（匹配设计图蓝色） */
        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 6px;
            background: #12acf3;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: #0f97d4;
        }

        .submit-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        /* 错误提示样式 */
        .error-message {
            color: #e53e3e;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            display: none;
        }

        .form-input.error {
            border-color: #e53e3e;
        }

        /* 加载状态样式 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem;
            }
            #borrowForm {
                padding: 1.5rem;
            }
            .test-form {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <h1 class="main-title">Hello World!!!!!!!!!!!</h1>
        <form onsubmit="handleSubmit(event)">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        <input type="submit" value="Submit">
    </form>
    <!-- 测试区域 -->
    <div class="test-section">
        <button class="test-btn" onclick="handleButtonClick()">Click Me!</button>
        <form class="test-form" onsubmit="handleFormSubmit(event)">
            <label for="testName">Sample Input:</label>
            <input type="text" id="testName" name="name" placeholder="Type something...">
            <input type="submit" value="Submit">
        </form>
    </div>

    <!-- 核心借用表单 -->
    <form id="borrowForm">
        <h2 class="form-header">校園物品借用申請表</h2>
        
        <!-- 姓名 -->
        <div class="form-group">
            <label class="form-label" for="borrowName">姓名：</label>
            <input type="text" id="borrowName" name="name" class="form-input" required placeholder="請輸入您的姓名">
            <div class="error-message" id="nameError">請輸入有效的姓名</div>
        </div>

        <!-- 學號/工號 -->
        <div class="form-group">
            <label class="form-label" for="idNum">學號/工號：</label>
            <input type="number" id="idNum" name="idNum" class="form-input" required placeholder="請輸入學號或工號">
            <div class="error-message" id="idError">請輸入有效的學號/工號</div>
        </div>

        <!-- 借用物品 -->
        <div class="form-group">
            <label class="form-label" for="item">借用物品：</label>
            <select id="item" name="item" class="form-input" required>
                <option value="">請選擇借用物品</option>
                <option value="laptop">筆記型電腦</option>
                <option value="projector">投影機</option>
                <option value="extension">延長線</option>
                <option value="boardgame">桌遊</option>
                <option value="sports">運動器材</option>
            </select>
            <div class="error-message" id="itemError">請選擇借用物品</div>
        </div>

        <!-- 身份類型 -->
        <div class="form-group">
            <label class="form-label">身份類型：</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="student" name="identity" value="student" required>
                    <label for="student">學生</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="teacher" name="identity" value="teacher">
                    <label for="teacher">老師</label>
                </div>
            </div>
            <div class="error-message" id="identityError">請選擇身份類型</div>
        </div>

        <!-- 借用天數 -->
        <div class="form-group">
            <label class="form-label" for="days">借用天數：</label>
            <input type="number" id="days" name="days" class="form-input" min="1" max="7" required placeholder="最多借用7天">
            <div class="error-message" id="daysError">請輸入1-7天之間的數字</div>
        </div>

        <!-- 額外需求 -->
        <div class="form-group">
            <label class="form-label">額外需求：</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="accessory" name="accessory" value="accessory">
                    <label for="accessory">需要配件（如充電器）</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="delivery" name="delivery" value="delivery">
                    <label for="delivery">需要配送至教室</label>
                </div>
            </div>
        </div>

        <!-- 借用用途 -->
        <div class="form-group">
            <label class="form-label" for="purpose">借用用途：</label>
            <textarea id="purpose" name="purpose" class="form-input" rows="3" required placeholder="請說明借用物品的用途"></textarea>
            <div class="error-message" id="purposeError">請輸入借用用途</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span id="btnText">提交申請</span>
            <span class="loading" id="loadingIcon" style="display: none;"></span>
        </button>
    </form>

<script>
    // 全局变量：防抖标记
    let isSubmitting = false;

    // 页面加载日志
    console.log("Page Loaded");

    // ---------------------- 测试区域功能 ----------------------
    function handleButtonClick() {
        console.log("Button Clicked");
        alert("Button Clicked! Trying to fetch data...");
        fetchData();
    }

    function handleFormSubmit(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const name = formData.get('name') || 'No input';
        
        console.log("Test Form Submitted | Input Value:", name);
        alert(`Test Form Submitted! You typed: ${name}\nTrying to fetch data...`);
        fetchData();
    }

    // ---------------------- 通用Fetch请求 ----------------------
    function fetchData(url = 'http://127.0.0.1:8000/', data = null, method = 'GET') {
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            }
        };

        if (data && method === 'POST') {
            options.body = JSON.stringify(data);
        }

        return fetch(url, options)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Server Error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log("Fetch Success | Data:", data);
                return data;
            })
            .catch(error => {
                console.error('Fetch Error:', error);
                alert(`Fetch Failed: ${error.message}\nPlease check if http://127.0.0.1:8000/ is running.`);
                throw error; // 抛出错误供上层处理
            });
    }

    // ---------------------- 借用表单验证 & 提交 ----------------------
    document.getElementById('borrowForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // 防抖：防止重复提交
        if (isSubmitting) return;
        isSubmitting = true;

        // 1. 表单验证
        const isValid = validateForm();
        if (!isValid) {
            isSubmitting = false;
            return;
        }

        // 2. 显示加载状态
        toggleLoading(true);

        // 3. 提取表单数据
        const formData = {
            name: this.borrowName.value,
            idNum: this.idNum.value,
            item: this.item.value,
            identity: document.querySelector('input[name="identity"]:checked')?.value,
            days: this.days.value,
            accessory: this.accessory.checked,
            delivery: this.delivery.checked,
            purpose: this.purpose.value
        };

        try {
            // 4. 提交数据到服务器（可选：替换为实际接口）
            // const response = await fetchData('http://127.0.0.1:8000/borrow', formData, 'POST');
            
            // 模拟提交成功（实际项目删除此行，使用上面的fetch请求）
            console.log('借用申請數據：', formData);
            alert('申請提交成功！請等待管理員審批。');
            
            // 5. 重置表单
            this.reset();
        } catch (error) {
            alert('提交失敗，請稍後再試！');
        } finally {
            // 6. 隐藏加载状态，恢复提交状态
            toggleLoading(false);
            isSubmitting = false;
        }
    });

    // 表单验证函数
    function validateForm() {
        let isValid = true;
        const borrowName = document.getElementById('borrowName');
        const idNum = document.getElementById('idNum');
        const item = document.getElementById('item');
        const identity = document.querySelector('input[name="identity"]:checked');
        const days = document.getElementById('days');
        const purpose = document.getElementById('purpose');

        // 验证姓名
        if (!borrowName.value.trim()) {
            showError(borrowName, 'nameError', '請輸入您的姓名');
            isValid = false;
        } else {
            hideError(borrowName, 'nameError');
        }

        // 验证学号/工号
        if (!idNum.value.trim()) {
            showError(idNum, 'idError', '請輸入學號/工號');
            isValid = false;
        } else {
            hideError(idNum, 'idError');
        }

        // 验证借用物品
        if (!item.value) {
            showError(item, 'itemError', '請選擇借用物品');
            isValid = false;
        } else {
            hideError(item, 'itemError');
        }

        // 验证身份类型
        if (!identity) {
            document.getElementById('identityError').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('identityError').style.display = 'none';
        }

        // 验证借用天数
        if (!days.value || days.value < 1 || days.value > 7) {
            showError(days, 'daysError', '請輸入1-7天之間的數字');
            isValid = false;
        } else {
            hideError(days, 'daysError');
        }

        // 验证借用用途
        if (!purpose.value.trim()) {
            showError(purpose, 'purposeError', '請說明借用物品的用途');
            isValid = false;
        } else {
            hideError(purpose, 'purposeError');
        }

        return isValid;
    }

    // 显示错误提示
    function showError(element, errorId, message) {
        element.classList.add('error');
        const errorElement = document.getElementById(errorId);
        errorElement.textContent = message;
        errorElement.style.display = 'block';
    }

    // 隐藏错误提示
    function hideError(element, errorId) {
        element.classList.remove('error');
        document.getElementById(errorId).style.display = 'none';
    }

    // 切换加载状态
    function toggleLoading(isLoading) {
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');

        if (isLoading) {
            submitBtn.disabled = true;
            btnText.textContent = '提交中...';
            loadingIcon.style.display = 'inline-block';
        } else {
            submitBtn.disabled = false;
            btnText.textContent = '提交申請';
            loadingIcon.style.display = 'none';
        }
    }

    // 输入框实时清除错误提示
    const formInputs = document.querySelectorAll('.form-input');
    formInputs.forEach(input => {
        input.addEventListener('input', function() {
            this.classList.remove('error');
            const errorId = this.id + 'Error';
            const errorElement = document.getElementById(errorId);
            if (errorElement) errorElement.style.display = 'none';
        });
    });

    // 单选框点击清除身份错误提示
    const identityRadios = document.querySelectorAll('input[name="identity"]');
    identityRadios.forEach(radio => {
        radio.addEventListener('click', function() {
            document.getElementById('identityError').style.display = 'none';
        });
    });

function handleclick(event){
    event.preventDefault();
    const formData = new FormData(event.target);
    const name = formData.get("name");
    const password = formData.get("reg_password");
    const myURL = "https://zany-goggles-vp7qg49xg55hw6qj-8000.app-github.dev";
    const apiPath = "/register";

    fetch(myURL + apiPath, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, password })
    }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error(error));
}

function handleSubmit(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const name = formData.get("name");
    const password = formData.get("password");
    const myURL = "https://zany-g0ggles-vp7qg49xg55hw6qj-8000.app-github.dev";
    const apiPath = "/submit";
    fetch(myURL + apiPath, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, password })
    }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error(error));
    console.log("Hello, world!");   
}
</script>
</script>
</body>
</html>
